# EXPLANATION: This config fixes Flutter Wasm/Web support.
# Default Nginx images often misidentify .wasm and .mjs files, 
# causing browsers to block them for security reasons.
#
# CACHING STRATEGY:
#
#   Block 1 — Entry-points & core logic (html, js, mjs, wasm, json):
#       no-cache, must-revalidate → browser caches the file but MUST ask the
#       server if it is still fresh before using it.  The server replies with
#       304 Not Modified (fast, no re-download) when nothing changed, or sends
#       the new file when it has.
#
#       JS, MJS, and WASM are included here because Flutter's main engine
#       files (flutter.js, flutter_bootstrap.js, main.dart.js) use STATIC
#       filenames — they are NOT content-hashed.  Marking them immutable would
#       cause browsers to permanently cache a stale version after a deployment.
#
#       JSON covers manifest.json and flutter_service_worker.js version
#       manifests that PWA browsers poll to detect updates.
#
#       no-store is intentionally NOT used so the browser can still serve the
#       cached copy offline while the revalidation is in flight (important for
#       PWAs).
#
#   Block 2 — Truly static assets (fonts, images, css):
#       public, max-age=31536000, immutable → cached for 1 year, never
#       re-requested.  Flutter DOES fingerprint assets/ folder contents
#       (images, fonts) and CSS files, so their URLs change with every build.
#
#   Block 3 — Catch-all (extensionless Flutter sub-routes like /settings):
#       Requests without a file extension (e.g. /settings, /dashboard) land
#       here.  try_files falls back to /index.html, which triggers an internal
#       redirect.  Nginx re-evaluates the new URI (/index.html) and Block 1
#       wins — so the correct no-cache header is applied to the final response.
#       The add_header here covers any other extensionless files that DO exist
#       on disk and are served directly without a redirect.

events { 
    # Mandatory block: tells Nginx how many concurrent connections to allow.
    worker_connections 1024; 
}

http {
    # Includes the standard OS-provided MIME types (images, css, etc.).
    include       /etc/nginx/mime.types; 
    
    # Fallback type if the file extension isn't recognized.
    default_type  application/octet-stream; 

    types {
        # Required for Flutter WebAssembly execution.
        application/wasm              wasm; 
        # Required for modern Flutter JavaScript modules.
        application/javascript        mjs;  
    }

    server {
        # The internal port the container listens on.
        listen 80;

        # Serve files from the Flutter build output directory.
        root /usr/share/nginx/html;

        # ------------------------------------------------------------------ #
        # 1. Entry-points & Core Logic — ALWAYS revalidate                    #
        #                                                                      #
        #    html  : index.html and any other HTML entry-points.              #
        #    js/mjs: flutter.js, flutter_bootstrap.js, main.dart.js all use   #
        #            static (non-hashed) filenames — must revalidate.         #
        #    wasm  : flutter.wasm also uses a static filename.                #
        #    json  : manifest.json + service-worker version files that PWA    #
        #            browsers poll to detect updates.                         #
        #                                                                      #
        #    NOTE: try_files is intentionally omitted here.  These requests   #
        #    already have a known extension; the /index.html fallback is not  #
        #    needed and would mask 404s for genuinely missing assets.         #
        # ------------------------------------------------------------------ #
        location ~* \.(html|js|mjs|wasm|json)$ {
            add_header Cache-Control "no-cache, must-revalidate";
        }

        # ------------------------------------------------------------------ #
        # 2. Truly Static Assets — Cache Forever                              #
        #                                                                      #
        #    Flutter fingerprints (content-hashes) everything inside the      #
        #    assets/ folder — fonts, images — and CSS files.  Their URLs      #
        #    change with every build, so it is safe to cache them indefinitely.#
        #                                                                      #
        #    immutable : tells the browser the file will NEVER change at this  #
        #                URL, so it can skip the revalidation request entirely.#
        # ------------------------------------------------------------------ #
        location ~* \.(css|ttf|woff|woff2|otf|eot|png|jpg|jpeg|gif|svg|ico|webp)$ {
            add_header Cache-Control "public, max-age=31536000, immutable";
        }

        # ------------------------------------------------------------------ #
        # 3. Default catch-all — Flutter client-side routes & everything else #
        #                                                                      #
        #    Extensionless URLs like /settings or /dashboard land here.       #
        #    try_files falls back to /index.html, which triggers an internal  #
        #    redirect.  Nginx re-evaluates /index.html and Block 1 wins, so   #
        #    the correct no-cache header is applied to the final response.    #
        #    The add_header below covers any extensionless files served       #
        #    directly (without a redirect).                                   #
        # ------------------------------------------------------------------ #
        location / {
            # The starting point of the application.
            index  index.html;

            # CRITICAL: If a user hits a sub-route (e.g. /settings), this 
            # sends them to index.html so Flutter can handle the routing internally.
            try_files $uri $uri/ /index.html;

            add_header Cache-Control "no-cache, must-revalidate";
        }
    }
}